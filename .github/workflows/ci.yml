name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # クロスプラットフォームなコア層（WindowManagerCore）を Linux 上でビルド & テストする。
  # ウィンドウ操作の純ロジック（RPC フレーミング/ワイヤフォーマット・座標変換）はここで保証される。
  linux-test:
    name: Linux (swift test, core)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      # ruby.wasm は容量が大きく未コミット（.gitignore 済み）。SwiftPM は宣言した
      # リソースが存在しないとビルドに失敗するため、空のプレースホルダを置く。
      # Linux の実行ファイルはスタブのみで ruby.wasm を読まないので空で問題ない。
      - name: Stub ruby.wasm resource
        run: touch Sources/WindowManager/Resources/ruby.wasm

      - name: swift test
        run: swift test

  # macOS 実機向けのビルド確認（高速ゲート）。WasmKit / ruby.wasm 連携の **コンパイル**を検証する。
  macos-build:
    name: macOS (build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Stub ruby.wasm resource
        run: touch Sources/WindowManager/Resources/ruby.wasm

      - name: swift build
        run: swift build

  # .app バンドルを実際に組み立てて成果物にする。
  # - タグ push（v*）: GitHub Release を作成して .app を添付。
  # - 手動実行（workflow_dispatch）: ワークフロー artifact として吐き出すだけ。
  # ※ adhoc 署名のみ（未公証）。他 Mac では初回 右クリック→開く 等が必要。実機での
  #   ウィンドウ操作・権限付与は CI では検証できない（ビルド成果物の提供のみ）。
  macos-app:
    name: macOS (.app release)
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 実 ruby.wasm（@ruby/3.x-wasm-wasi の ruby+stdlib.wasm）を npm から取得して同梱。
      - name: Fetch ruby.wasm
        run: make fetch-ruby

      # swift build -c release → .app 組み立て + adhoc 署名（Makefile の app ターゲット）。
      - name: Build WindowManager.app
        run: make app

      # .app はディレクトリなので、実行ビット/構造を保つため ditto で zip 化する。
      - name: Package .app
        run: ditto -c -k --keepParent WindowManager.app WindowManager.app.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowManager-app
          path: WindowManager.app.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes=$'WindowManager.app（adhoc 署名 / 未公証）。\n\n初回起動: 右クリック→開く、または\n  xattr -dr com.apple.quarantine WindowManager.app\nアクセシビリティ等の権限はシステム設定で付与してください。'
          gh release create "${GITHUB_REF_NAME}" WindowManager.app.zip \
            --title "${GITHUB_REF_NAME}" --notes "$notes" \
          || gh release upload "${GITHUB_REF_NAME}" WindowManager.app.zip --clobber
